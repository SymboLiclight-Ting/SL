version: "0.1"
kind: "IntentSpec"

metadata:
  name: "notestemplate"
  title: "NotesTemplate"
  owner: "symboliclight"

task:
  goal: "Build a generated SymbolicLight API skeleton."
  audience:
    - "Application developer"
  priority: "medium"

permissions:
  web: false
  filesystem:
    read: true
    write: true
  network: false
  tools:
    create_file: true
    delete_file: false
    send_email: false
    purchase: false

constraints:
  - "Use local SQLite storage only."

output:
  format: "markdown"
  language: "en"
  max_words: 500
  sections:
    - "Build"
    - "Run"
    - "Test"

tests:
  - name: "Notes smoke test"
    assert:
      - type: "required_sections"
