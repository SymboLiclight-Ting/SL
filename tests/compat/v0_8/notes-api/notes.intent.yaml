version: "0.1"
kind: "IntentSpec"

# sl: route GET /notes
# sl: route POST /notes
# sl: command add
# sl: command list
# sl: command count

metadata:
  name: "notes-api"
  title: "Notes API"
  owner: "symboliclight"

task:
  goal: "Build a small notes API and CLI using SL."
  audience:
    - "Application developer"
  priority: "medium"

permissions:
  web: true
  filesystem:
    read: true
    write: true
  network: false
  tools:
    create_file: true
    delete_file: false
    send_email: false
    purchase: false

constraints:
  - "Use local SQLite storage only."

output:
  format: "markdown"
  language: "en"
  max_words: 500
  sections:
    - "Run"
    - "Test"

tests:
  - name: "Notes API smoke test"
    assert:
      - type: "required_sections"
