version: "0.1"
kind: "IntentSpec"

# sl: command generate

metadata:
  name: "customer-brief-generator"
  title: "Customer Brief Generator"
  owner: "symboliclight"

task:
  goal: "Generate a customer brief from a local input file."
  audience:
    - "Application developer"
  priority: "medium"

permissions:
  web: false
  filesystem:
    read: true
    write: true
  network: false
  tools:
    create_file: true
    delete_file: false
    send_email: false
    purchase: false

constraints:
  - "Use local files only."
  - "Do not call external network services."

output:
  format: "markdown"
  language: "en"
  max_words: 500
  sections:
    - "Customer"
    - "Need"
    - "Next Step"

tests:
  - name: "Customer brief smoke test"
    assert:
      - type: "required_sections"
