version: "0.1"
kind: "IntentSpec"

metadata:
  name: "todo_app"
  title: "Todo API and CLI"
  owner: "symboliclight"

task:
  goal: "Build a local Todo application with CLI commands and JSON HTTP routes."
  audience:
    - "Application developer"
  priority: "high"

permissions:
  web: false
  filesystem:
    read: true
    write: true
  network: false
  tools:
    create_file: true
    delete_file: false
    send_email: false
    purchase: false

constraints:
  - "Use local SQLite storage only."
  - "Expose JSON routes for Todo items."
  - "Do not require network APIs or API keys."

output:
  format: "markdown"
  language: "en"
  max_words: 500
  sections:
    - "Build"
    - "Run"
    - "Test"

tests:
  - name: "All sections are present"
    assert:
      - type: "required_sections"
